width: 500
height: 400
gamma: 1

camera:
  type: RealisticCamera
  position: [ 0, 0., 7.5 ]
  look_at: [ 0, 0., 0 ]
  up: [ 0, 1, 0 ]
  fov: 32
  focal_length: 1
  aperture: 0
  samples: 1

scene:
  global_photons: 2048
  caustic_photons: 10000000
  materials:
    - name: other
      type: LambertianMaterial
      albedo: [ 0.8, 0.8, 0.8 ]
    - name: left
      type: LambertianMaterial
      albedo: [ 0.7, 0.4, 0.4 ]
    - name: right
      type: LambertianMaterial
      albedo: [ 0.4, 0.4, 0.7 ]
    - name: glass
      type: GlobalMaterial
      refract_weight: [ 1, 1, 1 ]
      alpha: 20
      ior: 1.5
    - name: mirror
      type: GlobalMaterial
      alpha: 20
      reflect_weight: [ 1, 1, 1 ]
    - name: light
      type: EmissiveMaterial
      intensity: [ 16, 16, 16 ]

  objects:
    # Floor
    - type: Quad
      point: [ -2, -1.6, -2 ]
      edge1: [ 4, 0, 0 ]
      edge2: [ 0, 0, 4 ]
      material: other

    # Back wall
    - type: Quad
      point: [ -2, -1.6, -2 ]
      edge1: [ 4, 0, 0 ]
      edge2: [ 0, 3.2, 0 ]
      material: other

    # Right wall
    - type: Quad
      point: [ 2, -1.6, -2 ]
      edge1: [ 0, 3.2, 0 ]
      edge2: [ 0, 0, 4 ]
      material: right

    # Left wall
    - type: Quad
      point: [ -2, -1.6, -2 ]
      edge1: [ 0, 3.2, 0 ]
      edge2: [ 0, 0, 4 ]
      material: left

    # Ceiling
    - type: Quad
      point: [ -2, 1.6, -2 ]
      edge1: [ 4, 0, 0 ]
      edge2: [ 0, 0, 4 ]
      material: other

    # Glass sphere
    - type: Sphere
      position: [ 0.9, -0.95, 0.8 ]
      radius: 0.65
      material: glass

    # Mirror sphere
    - type: Sphere
      position: [ -0.9, -0.95, -0.2 ]
      radius: 0.65
      material: mirror

    # Light object
    - type: Quad
      point: [ -0.7, 1.595, 0 ]
      edge1: [ 1.4, 0, 0 ]
      edge2: [ 0, 0, 1.2 ]
      material: light

  lights:
    - type: QuadLight
      intensity: [ 16, 16, 16 ]
      point: [ -0.7, 1.59, 0 ]
      edge1: [ 1.4, 0, 0 ]
      edge2: [ 0, 0, 1.2 ]