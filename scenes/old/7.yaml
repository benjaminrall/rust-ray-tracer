width: 500
height: 400
gamma: 1

camera:
  type: RealisticCamera
  position: [ 0, 0., 7.5 ]
  look_at: [ 0, 0., 0 ]
  up: [ 0, 1, 0 ]
  fov: 32
  focal_length: 1
  aperture: 0
  samples: 1

scene:
  global_photons: 2048
  caustic_photons: 10000000
  volume_photons: 10000000
  materials:
    - name: other
      type: LambertianMaterial
      albedo: [ 0.8, 0.8, 0.8 ]
    - name: left
      type: LambertianMaterial
      albedo: [ 0.7, 0.4, 0.4 ]
    - name: right
      type: LambertianMaterial
      albedo: [ 0.4, 0.4, 0.7 ]
    - name: glass
      type: GlobalMaterial
      refract_weight: [ 1, 1, 1 ]
      ior: 1.5
      alpha: 10000
    - name: light
      type: EmissiveMaterial
      intensity: [ 16, 16, 16 ]
    - name: v
      type: VolumeMaterial
      colour: [ 0.6, 0.6, 0.6 ]
      density: 0.5

  objects:
    # Floor
    - type: Quad
      point: [ -2, -1.6, -2 ]
      edge1: [ 0, 0, 4 ]
      edge2: [ 4, 0, 0 ]
      material: other

    # Back wall
    - type: Quad
      point: [ -2, -1.6, -2 ]
      edge1: [ 4, 0, 0 ]
      edge2: [ 0, 3.2, 0 ]
      material: other

    # Right wall
    - type: Quad
      point: [ 2, -1.6, -2 ]
      edge1: [ 0, 3.2, 0 ]
      edge2: [ 0, 0, 4 ]
      material: right

    # Left wall
    - type: Quad
      point: [ -2, -1.6, -2 ]
      edge1: [ 0, 3.2, 0 ]
      edge2: [ 0, 0, 4 ]
      material: left

    # Ceiling
    - type: Quad
      point: [ -2, 1.6, -2 ]
      edge1: [ 4, 0, 0 ]
      edge2: [ 0, 0, 4 ]
      material: other

    # Glass sphere
    - type: Sphere
      position: [ 0, 0.4, 0 ]
      radius: 0.65
      material: glass

    - type: ConstantMedium
      volume:
        # Glass sphere
        type: AABox
        centre: [ 0, 0, 0 ]
        size: [ 2 , 1.6, 2 ]
        material: none
      density: 0.5
      material: v

    # Light object
    - type: Quad
      point: [ -0.25, 1.595, -0.25 ]
      edge1: [ 0.5, 0, 0 ]
      edge2: [ 0, 0, 0.5 ]
      material: light

  lights:
    - type: QuadLight
      intensity: [ 64, 64, 64 ]
      point: [ -0.25, 1.59, -0.25 ]
      edge1: [ 0.5, 0, 0 ]
      edge2: [ 0, 0, 0.5 ]